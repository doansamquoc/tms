spring:
  application:
    name: TMS

  datasource:
    url: jdbc:postgresql://localhost:5432/tms
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-version: 0
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    date-format: "yyyy-MM-dd HH:mm:ss"

